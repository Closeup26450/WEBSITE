<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>closeup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">closeup</div>
    <div class="nav-about" id="navAbout">About</div>

    <img class="bg-image" id="bgImage" src="" alt="">

    <div class="about-page" id="aboutPage">
        <div class="about-close" id="aboutClose">Close</div>
        <div class="about-content">
            <p class="about-text">Closeup is a duo of photographers and filmmakers.</p>
            <div class="about-enquiries">
                <div class="about-enquiries-label">Enquiries and commissions</div>
                <a href="mailto:contact@closeup.cc" class="about-enquiries-email">CONTACT@CLOSEUP.CC</a>
            </div>
        </div>
    </div>

    <div class="cursor-butterfly" id="cursorButterfly"></div>

    <div class="book-wrap" id="bookWrap">
        <div class="accordion" id="accordion">
            <div class="accordion-grid" id="accordionGrid"></div>
        </div>
        <div class="book-trigger" id="bookTrigger">Summary</div>
    </div>

    <script>
        var slideImgs = [
            'https://freight.cargo.site/w/2000/q/75/i/66847329a3d1916ec1b464c15e94f148f7268054a0f508900101e19a3d84407a/DSC_1563.JPG',
            'https://freight.cargo.site/w/2000/q/75/i/9d36191373a711b65c0eaa86af989d5b507530366581434188eb52228db2db8b/Rosemarie-comme-Rosemarie-final5.jpg',
            'https://freight.cargo.site/w/2000/q/75/i/86ad52f3b1a4180dffcdd86182bb702ea884268166c41c45879b8e2e5e5279ef/20221024_allacarta_020-copy.jpg'
        ];

        var bgImage = document.getElementById('bgImage');

        function showBg(src) {
            bgImage.src = src;
            bgImage.classList.add('visible');
        }

        function hideBg() {
            bgImage.classList.remove('visible');
        }

        function isTouchPortrait() {
            return window.matchMedia('(hover: none) and (orientation: portrait)').matches;
        }

        var grid = document.getElementById('accordionGrid');
        var bookWrap = document.getElementById('bookWrap');
        var accordion = document.getElementById('accordion');
        var bookTrigger = document.getElementById('bookTrigger');
        var accordionOpen = false;

        var filmNums = [4, 17, 34, 47];
        var assigned = [];
        for (var i = 0; i < 50; i++) {
            assigned.push(slideImgs[Math.floor(Math.random() * slideImgs.length)]);
        }

        for (var i = 0; i < 50; i++) {
            (function(index) {
                var num = document.createElement('div');
                num.className = 'acc-num';
                var n = index + 1;
                var label = String(n).padStart(2, '0');
                num.textContent = filmNums.indexOf(n) !== -1 ? 'Film ' + label : label;
                var src = assigned[index];
                if (isTouchPortrait()) {
                    num.addEventListener('click', function(e) { e.stopPropagation(); showBg(src); });
                } else {
                    num.addEventListener('mouseenter', function() { showBg(src); });
                    num.addEventListener('mouseleave', function() { hideBg(); });
                }
                grid.appendChild(num);
            })(i);
        }

        if (isTouchPortrait()) {
            bookTrigger.addEventListener('click', function(e) {
                e.stopPropagation();
                accordionOpen = !accordionOpen;
                accordion.style.maxHeight = accordionOpen ? '700px' : '0';
                if (!accordionOpen) hideBg();
            });
            document.addEventListener('click', function(e) {
                if (!bookWrap.contains(e.target) && accordionOpen) {
                    accordionOpen = false;
                    accordion.style.maxHeight = '0';
                    hideBg();
                }
            });
        }

        var aboutPage = document.getElementById('aboutPage');
        var navAbout = document.getElementById('navAbout');

        function openAbout() { aboutPage.classList.add('active'); }
        function closeAbout() { aboutPage.classList.remove('active'); }

        if (isTouchPortrait() || window.innerWidth <= 500) {
            navAbout.addEventListener('click', function() { aboutPage.classList.toggle('active'); });
        } else {
            navAbout.addEventListener('mouseenter', function() { openAbout(); });
            navAbout.addEventListener('mouseleave', function(e) {
                if (!aboutPage.contains(e.relatedTarget)) closeAbout();
            });
            aboutPage.addEventListener('mouseleave', function(e) {
                if (!navAbout.contains(e.relatedTarget)) closeAbout();
            });
        }

        document.getElementById('aboutClose').addEventListener('mouseenter', function() { closeAbout(); });
        document.getElementById('aboutClose').addEventListener('click', function() { closeAbout(); });

        var cursor = document.getElementById('cursorButterfly');
        document.addEventListener('mousemove', function(e) {
            var offset = window.innerWidth <= 500 ? 50 : 100;
            cursor.style.left = (e.clientX - offset) + 'px';
            cursor.style.top = (e.clientY - offset) + 'px';
        });
    </script>

</body>
</html>
